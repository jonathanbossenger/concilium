<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent Dashboard — Login</title>
  <link rel="stylesheet" href="/auth.css">
</head>
<body>
  <div class="card">
    <h1>&#x1F916; Agent Dashboard</h1>
    <p class="subtitle">Sign in to continue.</p>

    <form id="login-form" novalidate>
      <label>
        <span>Username</span>
        <input type="text" name="username" autocomplete="username" required>
      </label>
      <label>
        <span>Password</span>
        <input type="password" name="password" autocomplete="current-password" required>
      </label>
      <div class="error" id="error-msg" aria-live="polite"></div>
      <button type="submit" id="submit-btn">Sign in</button>
    </form>
  </div>

  <script>
    (function () {
      const form = document.getElementById('login-form');
      const errorMsg = document.getElementById('error-msg');
      const submitBtn = document.getElementById('submit-btn');

      // If setup not yet done, redirect there.
      fetch('/auth/status').then(r => r.json()).then(data => {
        if (data.setupRequired) window.location.replace('/setup');
        else if (data.authenticated) window.location.replace('/');
      }).catch(() => {});

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorMsg.textContent = '';

        const username = form.username.value.trim();
        const password = form.password.value;

        if (!username || !password) {
          errorMsg.textContent = 'Username and password are required.';
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Signing in\u2026';

        try {
          const r = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
          });
          const data = await r.json();
          if (!r.ok) {
            if (data.setupRequired) {
              window.location.replace('/setup');
            } else {
              errorMsg.textContent = data.error || 'Login failed.';
            }
          } else {
            window.location.replace('/');
          }
        } catch (err) {
          errorMsg.textContent = 'Network error. Please try again.';
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Sign in';
        }
      });
    })();
  </script>
</body>
</html>
