<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent Dashboard</title>
  <script>
    (function () {
      var t = localStorage.getItem('theme');
      if (t === 'light' || t === 'dark') document.documentElement.dataset.theme = t;
    })();
  </script>
  <link rel="stylesheet" href="/vendor/xterm/css/xterm.css">
  <link rel="stylesheet" href="/style.css">
  <script src="/vendor/xterm/lib/xterm.js"></script>
  <script src="/vendor/xterm-addon-fit/lib/addon-fit.js"></script>
</head>
<body>
  <header>
    <h1>Agent Dashboard</h1>
    <div class="header-right">
      <span id="health"></span>
      <button type="button" id="new-card-btn" title="New session">+ New session</button>
      <button type="button" id="theme-toggle" title="Theme">Auto</button>
      <button type="button" id="open-settings" title="Settings">&#x2699;</button>
    </div>
  </header>
  <main id="cards"></main>

  <template id="card-template">
    <article class="card">
      <header class="card-header">
        <select class="card-agent" required></select>
        <span class="card-status"></span>
        <div class="card-actions">
          <button type="button" class="card-expand" title="Expand">&#x2922;</button>
          <a class="card-github" aria-label="Open on GitHub" title="Open on GitHub" target="_blank" rel="noopener noreferrer" hidden><svg height="16" width="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg></a>
          <button type="button" class="card-close" title="Close session">&times;</button>
        </div>
      </header>
      <form class="card-form">
        <div class="cwd-row">
          <input type="text" class="card-cwd" placeholder="working directory (default: $HOME)">
          <button type="button" class="card-cwd-browse" aria-label="Browse" title="Browse"><span aria-hidden="true">📂</span></button>
          <button type="submit" class="card-run" aria-label="Start" title="Start"><span aria-hidden="true">▶</span></button>
          <button type="button" class="card-open-term" aria-label="Open terminal" title="Open terminal"><span aria-hidden="true">&gt;_</span></button>
        </div>
      </form>
      <div class="card-term"></div>
    </article>
  </template>

  <template id="terminal-card-template">
    <article class="card card-terminal">
      <header class="card-header">
        <span class="card-term-label">Terminal</span>
        <span class="card-status"></span>
        <button type="button" class="card-expand" title="Expand">&#x2922;</button>
        <button type="button" class="card-close" title="Close terminal">&times;</button>
      </header>
      <div class="card-term"></div>
    </article>
  </template>

  <dialog id="settings-dialog">
    <div class="dialog-body">
      <div class="dialog-head">
        <h2>Settings</h2>
        <button type="button" class="close-btn" id="close-settings" title="Close">&times;</button>
      </div>

      <section>
        <h3>Configured agents</h3>
        <table id="agents-table">
          <thead><tr><th>ID</th><th>Name</th><th>Command</th><th>Mode</th><th></th></tr></thead>
          <tbody></tbody>
        </table>
      </section>

      <section>
        <h3 id="agent-form-title">Add agent</h3>
        <form id="agent-form" class="agent-form">
          <div class="grid">
            <label>ID<input type="text" name="id" required pattern="[A-Za-z0-9_-]+"></label>
            <label>Name<input type="text" name="name"></label>
            <label>Command<input type="text" name="command" required placeholder="/usr/local/bin/foo or just foo"></label>
            <label>Args (space-separated)<input type="text" name="args"></label>
            <label class="check"><input type="checkbox" name="interactive"> Interactive (PTY)</label>
          </div>
          <div class="row">
            <button type="submit" id="agent-submit">Add</button>
            <button type="button" id="agent-cancel" hidden>Cancel</button>
          </div>
        </form>
      </section>

      <section>
        <h3>Discover from PATH <button type="button" id="discover-btn">Scan</button></h3>
        <table id="discover-table">
          <thead><tr><th>ID</th><th>Command</th><th>Path</th><th></th></tr></thead>
          <tbody></tbody>
        </table>
      </section>

      <section class="footnote">
        Config file: <code>~/.agent-dashboard/config.yaml</code> · Port changes require server restart.
      </section>
    </div>
  </dialog>

  <script src="/app.js"></script>
</body>
</html>
